  name: Azure Static Web Apps CI/CD

  on:
    push:
      branches:
        - main
    pull_request:
      types: [opened, synchronize, reopened, closed]
      branches:
        - main

  jobs:
    build_and_deploy_job:
      if: github.event_name == 'push' || (github.event_name ==
  'pull_request' && github.event.action != 'closed')
      runs-on: ubuntu-latest
      name: Build and Deploy Job
      permissions:
        id-token: write
        contents: read

      steps:
        - uses: actions/checkout@v4
          with:
            submodules: true
            lfs: false

        - name: Install OIDC Client from Core Package
          run: npm install @actions/core@1.6.0 @actions/http-client

        - name: Get Id Token
          uses: actions/github-script@v7
          id: idtoken
          with:
            script: |
              return await core.getIDToken()
            result-encoding: string

        - name: Build And Deploy
          id: builddeploy
          uses: Azure/static-web-apps-deploy@v1
          with:
            azure_static_web_apps_api_token:
  ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_HILL_0D4E07800 }}
            action: "upload"
            app_location: "./frontend"
            api_location: ""
            output_location: "dist"
            app_build_command: "npm run build"
            github_id_token: ${{ steps.idtoken.outputs.result }}
          env:
            API_BASE_URL:
  "https://mindtechmystery-h8c5c7azadftg2hh.southeastasia-01.azurewebsites.net"
            SKIP_DEPLOY_ON_MISSING_SECRETS: true

    close_pull_request_job:
      if: github.event_name == 'pull_request' && github.event.action ==
  'closed'
      runs-on: ubuntu-latest
      name: Close Pull Request Job
      steps:
        - name: Close Pull Request
          id: closepullrequest
          uses: Azure/static-web-apps-deploy@v1
          with:
            azure_static_web_apps_api_token:
  ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_HILL_0D4E07800 }}
            action: "close"
